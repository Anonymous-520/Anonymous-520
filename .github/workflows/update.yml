name: Refresh System Status

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths-ignore:
      - "assets/system-status.svg"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Render system status asset
        env:
          PROFILE_LOGIN: ${{ github.repository_owner }}
          GITHUB_SHA: ${{ github.sha }}
        run: node .github/scripts/render-status.mjs assets/system-status.svg

      - name: Commit system status asset
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/system-status.svg
          if git diff --cached --quiet; then
            echo "No status changes to commit."
          else
            git commit -m "chore: refresh system status"
            git push
          fi
