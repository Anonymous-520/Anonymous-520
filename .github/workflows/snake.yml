name: Render Contribution Snake

on:
  workflow_dispatch:
  schedule:
    - cron: "31 2 * * *"

permissions:
  contents: write

jobs:
  render:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout profile repository
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch GitHub contribution data
        env:
          GITHUB_TOKEN: ${{ github.token }}
          PROFILE_LOGIN: ${{ github.repository_owner }}
        run: node .github/scripts/fetch-github-data.mjs github-data.json

      - name: Render contribution snake
        run: node .github/scripts/render-snake.mjs github-data.json assets/snake.svg

      - name: Commit contribution snake
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add assets/snake.svg
          if git diff --cached --quiet; then
            echo "No snake changes to commit."
          else
            git commit -m "chore: refresh contribution snake"
            git push
          fi
