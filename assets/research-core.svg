<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">Research Core</title>
  <desc id="desc">Research interface listing AI research areas and system modules.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1">
      <stop offset="0" stop-color="#fff0a6"/>
      <stop offset="0.55" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#6f5a18"/>
    </linearGradient>
    <filter id="glow" x="-35%" y="-35%" width="170%" height="170%">
      <feGaussianBlur stdDeviation="3" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#ffffff" stroke-opacity="0.04"/>
    </pattern>
  </defs>
  <rect width="1200" height="520" fill="#000"/>
  <rect width="1200" height="520" fill="url(#grid)"/>
  <text x="54" y="64" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">RESEARCH CORE</text>
  <text x="54" y="94" fill="#d4af37" font-family="Consolas, monospace" font-size="14">CURRENT RESEARCH AREAS / AI SYSTEMS / KNOWLEDGE INFRASTRUCTURE</text>

  <g transform="translate(70 138)">
    <rect width="1060" height="318" rx="16" fill="#050505" stroke="#d4af37" stroke-opacity="0.35"/>
    <line x1="0" y1="66" x2="1060" y2="66" stroke="#ffffff" stroke-opacity="0.1"/>
    <text x="28" y="42" fill="#ffffff" font-family="Consolas, monospace" font-size="15">SILLIONONA RESEARCH INTERFACE</text>
    <g transform="translate(34 100)" font-family="Inter, Segoe UI, Arial, sans-serif">
      <g>
        <rect width="296" height="72" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
        <text x="20" y="30" fill="#d4af37" font-size="15" font-weight="800">Large Language Models</text>
        <text x="20" y="54" fill="#ffffff" opacity="0.68" font-size="13">Research, structure, auditability</text>
      </g>
      <g transform="translate(342 0)">
        <rect width="296" height="72" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
        <text x="20" y="30" fill="#d4af37" font-size="15" font-weight="800">Neural Architectures</text>
        <text x="20" y="54" fill="#ffffff" opacity="0.68" font-size="13">Memory, gating, learning loops</text>
      </g>
      <g transform="translate(684 0)">
        <rect width="296" height="72" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
        <text x="20" y="30" fill="#d4af37" font-size="15" font-weight="800">Intelligent Agents</text>
        <text x="20" y="54" fill="#ffffff" opacity="0.68" font-size="13">Tool systems and autonomy boundaries</text>
      </g>
      <g transform="translate(0 110)">
        <rect width="296" height="72" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
        <text x="20" y="30" fill="#d4af37" font-size="15" font-weight="800">Automation</text>
        <text x="20" y="54" fill="#ffffff" opacity="0.68" font-size="13">Repeatable infrastructure and workflows</text>
      </g>
      <g transform="translate(342 110)">
        <rect width="296" height="72" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
        <text x="20" y="30" fill="#d4af37" font-size="15" font-weight="800">Human-AI Systems</text>
        <text x="20" y="54" fill="#ffffff" opacity="0.68" font-size="13">Interfaces, collaboration, verification</text>
      </g>
      <g transform="translate(684 110)">
        <rect width="296" height="72" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
        <text x="20" y="30" fill="#d4af37" font-size="15" font-weight="800">Continual Learning</text>
        <text x="20" y="54" fill="#ffffff" opacity="0.68" font-size="13">Memory, updates, long-horizon systems</text>
      </g>
    </g>
    <path d="M34 270H1010" stroke="url(#gold)" stroke-width="2" filter="url(#glow)">
      <animate attributeName="stroke-dasharray" values="0 980;340 640;0 980" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>
</svg>
