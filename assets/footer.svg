<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="280" viewBox="0 0 1200 280" role="img" aria-labelledby="title desc">
  <title id="title">Sillionona Footer</title>
  <desc id="desc">Luxury footer for Sillionona with animated stars and gold glow.</desc>
  <defs>
    <radialGradient id="glow" cx="50%" cy="50%" r="60%">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.24"/>
      <stop offset="0.58" stop-color="#d4af37" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="stars" width="90" height="90" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="34" r="1" fill="#fff" opacity="0.2"/>
      <circle cx="70" cy="16" r="1.3" fill="#d4af37" opacity="0.34"/>
      <circle cx="48" cy="74" r="0.8" fill="#fff" opacity="0.16"/>
    </pattern>
  </defs>
  <rect width="1200" height="280" fill="#000"/>
  <rect width="1200" height="280" fill="url(#stars)"/>
  <rect width="1200" height="280" fill="url(#glow)"/>
  <g text-anchor="middle" font-family="Inter, Segoe UI, Arial, sans-serif">
    <text x="600" y="120" fill="#ffffff" font-size="42" font-weight="900">SILLIONONA</text>
    <text x="600" y="158" fill="#d4af37" font-size="18" font-weight="700">Building Future Systems Through Research, Innovation &amp; Technology</text>
    <line x1="430" y1="190" x2="770" y2="190" stroke="#d4af37" stroke-width="2">
      <animate attributeName="stroke-dasharray" values="0 340;180 160;0 340" dur="5s" repeatCount="indefinite"/>
    </line>
  </g>
</svg>
