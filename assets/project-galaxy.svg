<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="560" viewBox="0 0 1200 560" role="img" aria-labelledby="title desc">
  <title id="title">Project Galaxy</title>
  <desc id="desc">Repositories and initiatives represented as orbiting planets around Sillionona.</desc>
  <defs>
    <radialGradient id="center" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fff1a8"/>
      <stop offset="0.45" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#5f4d18"/>
    </radialGradient>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="starfield" width="100" height="100" patternUnits="userSpaceOnUse">
      <circle cx="18" cy="28" r="1" fill="#fff" opacity="0.18"/>
      <circle cx="72" cy="18" r="1.2" fill="#d4af37" opacity="0.3"/>
      <circle cx="48" cy="80" r="0.8" fill="#fff" opacity="0.22"/>
    </pattern>
  </defs>
  <rect width="1200" height="560" fill="#000"/>
  <rect width="1200" height="560" fill="url(#starfield)"/>
  <text x="54" y="65" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="800">PROJECT GALAXY</text>
  <text x="54" y="94" fill="#d4af37" font-family="Consolas, monospace" font-size="14">REPOSITORIES AS PLANETS / SILLIONONA AS GRAVITY WELL</text>

  <g transform="translate(620 302)">
    <ellipse rx="390" ry="154" fill="none" stroke="#ffffff" stroke-opacity="0.1"/>
    <ellipse rx="300" ry="116" fill="none" stroke="#d4af37" stroke-opacity="0.16"/>
    <ellipse rx="210" ry="82" fill="none" stroke="#ffffff" stroke-opacity="0.12"/>
    <circle r="48" fill="url(#center)" filter="url(#glow)"/>
    <text x="-55" y="5" fill="#000000" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="14" font-weight="900">SILLIONONA</text>

    <g>
      <line x1="0" y1="0" x2="-300" y2="-100" stroke="#d4af37" stroke-opacity="0.35"/>
      <circle cx="-300" cy="-100" r="28" fill="#111" stroke="#d4af37" stroke-width="2"/>
      <text x="-344" y="-138" fill="#fff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">QNLLM</text>
    </g>
    <g>
      <line x1="0" y1="0" x2="-205" y2="92" stroke="#d4af37" stroke-opacity="0.35"/>
      <circle cx="-205" cy="92" r="24" fill="#111" stroke="#ffffff" stroke-opacity="0.6"/>
      <text x="-258" y="135" fill="#fff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">Source Lens</text>
    </g>
    <g>
      <line x1="0" y1="0" x2="-42" y2="-160" stroke="#d4af37" stroke-opacity="0.35"/>
      <circle cx="-42" cy="-160" r="24" fill="#111" stroke="#d4af37" stroke-width="2"/>
      <text x="-86" y="-198" fill="#fff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">HackLabify</text>
    </g>
    <g>
      <line x1="0" y1="0" x2="198" y2="-86" stroke="#d4af37" stroke-opacity="0.35"/>
      <circle cx="198" cy="-86" r="23" fill="#111" stroke="#ffffff" stroke-opacity="0.6"/>
      <text x="160" y="-124" fill="#fff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">SillionPay</text>
    </g>
    <g>
      <line x1="0" y1="0" x2="315" y2="70" stroke="#d4af37" stroke-opacity="0.35"/>
      <circle cx="315" cy="70" r="25" fill="#111" stroke="#d4af37" stroke-width="2"/>
      <text x="286" y="112" fill="#fff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">TAPCBM</text>
    </g>
    <g>
      <line x1="0" y1="0" x2="72" y2="150" stroke="#d4af37" stroke-opacity="0.35"/>
      <circle cx="72" cy="150" r="23" fill="#111" stroke="#ffffff" stroke-opacity="0.6"/>
      <text x="36" y="194" fill="#fff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">SJAGWEB</text>
    </g>
    <circle r="8" fill="#ffffff" opacity="0.9">
      <animateMotion dur="14s" repeatCount="indefinite" path="M390 0A390 154 0 1 1 -390 0A390 154 0 1 1 390 0"/>
    </circle>
  </g>
</svg>
