<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="420" viewBox="0 0 1200 420" role="img" aria-labelledby="title desc">
  <title id="title">Sillionona OS command center banner</title>
  <desc id="desc">A premium black, white, and gold animated hero banner for Saksham Rastogi's GitHub profile.</desc>
  <defs>
    <linearGradient id="gold" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#fff7cc"/>
      <stop offset="0.45" stop-color="#d4af37"/>
      <stop offset="1" stop-color="#6e5b20"/>
    </linearGradient>
    <radialGradient id="halo" cx="50%" cy="40%" r="60%">
      <stop offset="0" stop-color="#d4af37" stop-opacity="0.22"/>
      <stop offset="0.55" stop-color="#d4af37" stop-opacity="0.06"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#ffffff" stroke-opacity="0.06" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feColorMatrix in="blur" type="matrix" values="1 0 0 0 0.83 0 1 0 0 0.69 0 0 1 0 0.22 0 0 0 0.9 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <mask id="fade">
      <rect width="1200" height="420" fill="url(#soft)"/>
    </mask>
    <linearGradient id="soft" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.92"/>
      <stop offset="0.78" stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0.3"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="420" fill="#000000"/>
  <rect width="1200" height="420" fill="url(#grid)" opacity="0.95"/>
  <rect width="1200" height="420" fill="url(#halo)"/>
  <g opacity="0.42" mask="url(#fade)">
    <path d="M30 348C180 250 282 320 414 221C562 111 676 197 826 91C946 6 1082 74 1174 24" fill="none" stroke="#d4af37" stroke-opacity="0.38" stroke-width="1.5">
      <animate attributeName="stroke-dasharray" values="0 1500;420 1080;0 1500" dur="10s" repeatCount="indefinite"/>
    </path>
    <path d="M52 382C202 287 330 357 485 258C616 174 758 229 899 149C1025 78 1108 118 1188 75" fill="none" stroke="#ffffff" stroke-opacity="0.15" stroke-width="1">
      <animate attributeName="stroke-dasharray" values="60 1000;360 700;60 1000" dur="13s" repeatCount="indefinite"/>
    </path>
  </g>

  <g filter="url(#glow)">
    <circle cx="980" cy="118" r="3" fill="#d4af37">
      <animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1040" cy="78" r="2" fill="#ffffff">
      <animate attributeName="opacity" values="1;0.3;1" dur="3.4s" repeatCount="indefinite"/>
    </circle>
    <circle cx="885" cy="180" r="2.4" fill="#d4af37">
      <animate attributeName="opacity" values="0.35;1;0.35" dur="4s" repeatCount="indefinite"/>
    </circle>
  </g>

  <g transform="translate(56 48)">
    <rect x="0" y="0" width="350" height="168" rx="14" fill="#050505" stroke="#d4af37" stroke-opacity="0.7"/>
    <rect x="0" y="0" width="350" height="30" rx="14" fill="#111111"/>
    <circle cx="22" cy="15" r="4" fill="#d4af37"/>
    <circle cx="40" cy="15" r="4" fill="#ffffff" opacity="0.45"/>
    <circle cx="58" cy="15" r="4" fill="#ffffff" opacity="0.22"/>
    <text x="22" y="61" fill="#d4af37" font-family="Consolas, monospace" font-size="15">INITIALIZING SILLIONONA OS...</text>
    <text x="22" y="91" fill="#ffffff" font-family="Consolas, monospace" font-size="15" opacity="0.88">LOADING AI MODULES...</text>
    <text x="22" y="121" fill="#ffffff" font-family="Consolas, monospace" font-size="15" opacity="0.76">CONNECTING RESEARCH NETWORK...</text>
    <text x="22" y="151" fill="#d4af37" font-family="Consolas, monospace" font-size="15">SYSTEM STATUS: ONLINE</text>
    <rect x="20" y="134" width="6" height="18" fill="#d4af37">
      <animate attributeName="opacity" values="0;1;0" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(56 250)">
    <rect width="210" height="76" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="20" y="30" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" opacity="0.62">ORIGIN NODE</text>
    <text x="20" y="57" fill="#d4af37" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">NEW DELHI</text>
  </g>

  <g transform="translate(305 250)">
    <rect width="250" height="76" rx="10" fill="#ffffff" fill-opacity="0.04" stroke="#ffffff" stroke-opacity="0.12"/>
    <text x="20" y="30" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="13" opacity="0.62">OPERATING VECTOR</text>
    <text x="20" y="57" fill="#d4af37" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="21" font-weight="700">AI / RESEARCH</text>
  </g>

  <g transform="translate(590 76)">
    <text x="0" y="34" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="16" letter-spacing="4">SILLIONONA OS</text>
    <text x="0" y="104" fill="#ffffff" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="58" font-weight="800">SAKSHAM RASTOGI</text>
    <text x="0" y="148" fill="url(#gold)" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="25" font-weight="700">Founder of Sillionona / Creator of HackLabify</text>
    <text x="0" y="188" fill="#ffffff" opacity="0.82" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="19">AI / RESEARCH / FINANCE / INNOVATION</text>
    <line x1="0" y1="222" x2="520" y2="222" stroke="url(#gold)" stroke-width="2"/>
    <text x="0" y="260" fill="#ffffff" opacity="0.64" font-family="Inter, Segoe UI, Arial, sans-serif" font-size="15">A future venture operating system for intelligent systems, automation, and knowledge infrastructure.</text>
  </g>
</svg>
